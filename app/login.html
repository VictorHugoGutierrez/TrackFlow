<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="TrackFlow — Faça login ou crie sua conta para gerenciar clientes e projetos."
    />
    <title>TrackFlow — Entrar</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⏱</text></svg>"
    />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>

  <body class="page-login" data-theme="dark">
    <main class="login-card">
      <h1 id="titulo-form">Entrar</h1>

      <form id="form-autenticacao" novalidate>
        <fieldset id="nome" class="form-grupo" style="display: none">
          <label for="input-nome">Nome</label>
          <input
            type="text"
            id="input-nome"
            class="form-input"
            placeholder="Digite seu nome"
            autocomplete="name"
          />
        </fieldset>

        <fieldset id="email" class="form-grupo">
          <label for="input-email">Email</label>
          <input
            type="email"
            id="input-email"
            class="form-input"
            placeholder="seu@email.com"
            autocomplete="email"
            required
          />
        </fieldset>

        <fieldset id="senha" class="form-grupo">
          <label for="input-senha">Senha</label>
          <input
            type="password"
            id="input-senha"
            class="form-input"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
        </fieldset>

        <p style="text-align: right; margin-top: -8px; margin-bottom: 15px">
          <a href="#" id="btn-esqueci" class="link-texto"
            >Esqueci minha senha</a
          >
        </p>

        <button
          type="submit"
          id="btnEntrar"
          class="btn btn-primario btn-bloco btn-lg"
        >
          Entrar
        </button>
      </form>

      <p class="divisor">ou</p>

      <button
        type="button"
        id="btn-google"
        class="btn btn-google btn-bloco btn-lg"
      >
        <svg
          width="18"
          height="18"
          viewBox="0 0 18 18"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M17.64 9.20c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"
            fill="#4285F4"
          />
          <path
            d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z"
            fill="#34A853"
          />
          <path
            d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"
            fill="#FBBC05"
          />
          <path
            d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"
            fill="#EA4335"
          />
        </svg>
        Entrar com Google
      </button>

      <p class="form-footer">
        <span id="label-modo">Não tem conta?</span>
        <a href="#" id="link-alternar-modo" class="link-texto">Criar Conta</a>
      </p>
    </main>

    <script type="module" src="./js/login.js"></script>
  </body>
</html>
